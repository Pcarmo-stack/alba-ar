<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1208" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zarra AR Experience</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('billboard', {
        tick: function () {
          const cam = this.el.sceneEl && this.el.sceneEl.camera;
          if (!cam) return;
          const camPos = new THREE.Vector3();
          cam.getWorldPosition(camPos);
          this.el.object3D.lookAt(camPos);
        },
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Megrim&family=Nunito:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ==========================================================
         DESIGN TOKENS  ·  edit these to retheme the whole experience
         ========================================================== */
      :root {
        --orange:     #E48043;   /* Card 1 / primary action */
        --olive:      #9C963A;   /* Card 2 — the ingredient */
        --amber:      #D9A032;   /* Card 3 — the valley */
        --sage:       #8FA38C;   /* Card 4 — the brewer */
        --cream:      #F5E8D0;   /* Popup body */
        --paper:      #FBF5E6;   /* Light card wash */
        --ink:        #2A1A0E;   /* Primary text */
        --ink-soft:   rgba(42, 26, 14, 0.6);
        --ink-faint:  rgba(42, 26, 14, 0.35);
        --teal:       #4B7E8F;   /* Popup accent stroke */
        --bg:         #1a1208;   /* Splash background */

        --font-display: 'Megrim', cursive;
        --font-body:    'Nunito', system-ui, sans-serif;

        --t-fast:   180ms;
        --t-med:    360ms;
        --t-slow:   720ms;
        --ease:     cubic-bezier(0.4, 0, 0.2, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        overflow: hidden;
        background: transparent;
        font-family: var(--font-body);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      img { display: block; max-width: 100%; }
      button {
        appearance: none; border: 0; background: 0; cursor: pointer;
        font: inherit; color: inherit;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        z-index: 1;
      }

      /* ==========================================================
         SCREEN SYSTEM
         ========================================================== */
      .screen {
        position: fixed; inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        padding: 1.4rem;
        opacity: 0;
        visibility: hidden;
        transition: opacity var(--t-med) var(--ease),
                    visibility var(--t-med) var(--ease);
        pointer-events: none;
      }
      .screen.is-active {
        opacity: 1; visibility: visible;
        pointer-events: auto;
      }

      /* ----------  STATE 1 · INTRO  ---------- */
      #screen-intro {
        z-index: 50;
        background:
          radial-gradient(ellipse at 50% 38%, #3a240e 0%, #1a1208 70%),
          var(--bg);
        text-align: center;
      }
      .intro-inner { max-width: 22rem; }
      .intro-orn {
        width: 64px;
        margin: 0 auto 1.2rem;
        opacity: 0.7;
        filter: brightness(1.15) saturate(0.7);
      }
      .intro-mark {
        font-family: var(--font-display);
        font-size: 4.2rem;
        letter-spacing: 0.18em;
        color: #fdf6e3;
        line-height: 1;
        margin: 0 0 0.3rem;
      }
      .intro-sub {
        font-weight: 300; font-style: italic;
        font-size: 1rem;
        letter-spacing: 0.08em;
        color: rgba(253, 246, 227, 0.6);
        margin: 0 0 2.6rem;
      }
      .intro-cta {
        font-family: var(--font-display);
        font-size: 1.3rem;
        letter-spacing: 0.22em;
        color: #fdf6e3;
        background: var(--orange);
        padding: 0.95rem 2.4rem;
        border-radius: 999px;
        box-shadow: 0 8px 28px rgba(228, 128, 67, 0.35);
        transition: transform var(--t-fast) var(--ease),
                    box-shadow var(--t-fast) var(--ease);
      }
      .intro-cta:active {
        transform: translateY(1px) scale(0.98);
        box-shadow: 0 4px 16px rgba(228, 128, 67, 0.25);
      }
      .intro-hint {
        margin-top: 1.6rem;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.4);
      }

      /* ----------  STATE 2 · SCANNING  ---------- */
      #screen-scan { background: transparent; }
      .scan-frame {
        position: relative;
        width: min(70vw, 280px);
        aspect-ratio: 0.62;
        border: 1px solid rgba(253, 246, 227, 0.45);
        animation: scan-pulse 2.4s ease-in-out infinite;
      }
      .scan-frame::before,
      .scan-frame::after,
      .scan-frame > i:nth-child(1),
      .scan-frame > i:nth-child(2) {
        content: '';
        position: absolute;
        width: 22px; height: 22px;
        border: 2px solid var(--orange);
      }
      .scan-frame::before { top: -1px; left: -1px;  border-right: 0; border-bottom: 0; }
      .scan-frame::after  { top: -1px; right: -1px; border-left:  0; border-bottom: 0; }
      .scan-frame > i:nth-child(1) { bottom: -1px; left: -1px;  border-right: 0; border-top: 0; }
      .scan-frame > i:nth-child(2) { bottom: -1px; right: -1px; border-left:  0; border-top: 0; }
      .scan-hint {
        position: absolute;
        top: calc(100% + 1.8rem);
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-display);
        font-size: 1.3rem;
        letter-spacing: 0.18em;
        color: #fdf6e3;
        white-space: nowrap;
        text-align: center;
      }
      .scan-hint em {
        display: block;
        font-family: var(--font-body);
        font-style: normal;
        font-weight: 300;
        font-size: 0.72rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.5);
        margin-top: 0.6rem;
      }
      @keyframes scan-pulse {
        0%, 100% { transform: scale(1);     opacity: 1;    }
        50%      { transform: scale(1.035); opacity: 0.55; }
      }

      .dev-skip {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0) + 1rem);
        right: 1rem;
        z-index: 100;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.5);
        padding: 0.5rem 0.9rem;
        border: 1px solid rgba(253, 246, 227, 0.2);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
      }
      body:not(.is-debug) .dev-skip { display: none; }

      /* ----------  STATE 3 · DETECTED PROMPT  ---------- */
      #screen-detected { background: rgba(10, 7, 3, 0.45); }
      .prompt-card {
        background: var(--paper);
        border-radius: 18px;
        padding: 2rem 1.8rem 1.6rem;
        width: min(86vw, 320px);
        text-align: center;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(42, 26, 14, 0.05);
        transform: translateY(20px) scale(0.96);
        opacity: 0;
        transition: transform var(--t-slow) var(--ease-out),
                    opacity var(--t-slow) var(--ease-out);
      }
      .is-active .prompt-card { transform: translateY(0) scale(1); opacity: 1; }
      .prompt-eyebrow {
        font-size: 0.66rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 0 0 1.1rem;
      }
      .prompt-eyebrow .dot { color: var(--orange); margin: 0 0.45em; }
      .prompt-title {
        font-family: var(--font-display);
        font-size: 2rem;
        letter-spacing: 0.06em;
        margin: 0 0 0.4rem;
        color: var(--ink);
        line-height: 1.05;
      }
      .prompt-sub {
        font-weight: 300;
        font-size: 0.85rem;
        color: var(--ink-soft);
        margin: 0 0 1.5rem;
      }
      .prompt-cta {
        display: block;
        width: 100%;
        font-family: var(--font-display);
        font-size: 1.05rem;
        letter-spacing: 0.18em;
        color: #fdf6e3;
        background: var(--orange);
        padding: 0.85rem 1rem;
        border-radius: 999px;
        transition: transform var(--t-fast) var(--ease);
      }
      .prompt-cta:active { transform: scale(0.98); }
      .prompt-tag {
        margin: 1rem 0 0;
        font-size: 0.66rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }

      /* ----------  STATE 4 · VALLEY  ---------- */
      #screen-valley {
        background: transparent;
        align-items: end;
        padding-bottom: calc(env(safe-area-inset-bottom, 0) + 2rem);
      }
      .valley-hint {
        font-size: 0.72rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #fdf6e3;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        padding: 0.7rem 1.2rem;
        border: 1px solid rgba(253, 246, 227, 0.35);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(6px);
        animation: hint-breathe 2.4s ease-in-out infinite;
        opacity: 0;
        animation-delay: 1.4s;
        animation-fill-mode: forwards;
      }
      @keyframes hint-breathe {
        0%       { opacity: 0; transform: translateY(8px) scale(0.75); }
        20%, 80% { opacity: 1; transform: translateY(0);    }
        50%      { opacity: 0.65; }
        100%     { opacity: 1; transform: translateY(0);    }
      }

      /* ----------  STATE 5 · CARDS  ---------- */
      #screen-cards { background: rgba(10, 7, 3, 0.35); }
      .card-stage {
        position: relative;
        width: min(82vw, 340px);
        aspect-ratio: 0.72;
      }
      .card {
        position: absolute;
        inset: 0;
        border-radius: 16px;
        overflow: hidden;
        background: var(--bg-color);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(0, 0, 0, 0.06);
        opacity: 0;
        transform: translateX(40px) scale(0.97);
        transition: opacity var(--t-med) var(--ease-out),
                    transform var(--t-med) var(--ease-out);
        display: flex;
        flex-direction: column;
        padding: 1.8rem 1.6rem;
      }
      .card.is-current { opacity: 1; transform: translateX(0) scale(1); }
      .card.is-past    { opacity: 0; transform: translateX(-40px) scale(0.97); }
      .card[data-color="orange"] { --bg-color: var(--orange); }
      .card[data-color="olive"]  { --bg-color: var(--olive);  }
      .card[data-color="amber"]  { --bg-color: var(--amber);  }
      .card[data-color="sage"]   { --bg-color: var(--sage);   }

      .card-art {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 0.5rem;
        padding-bottom: 1.8rem;
        min-height: 0;
        align-items: flex-start;
      }
      .card-art img {
        max-height: 100%;
        max-width: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.18));
      }
      .card-meta {
        display: flex;
        align-items: baseline;
        gap: 0.6em;
        font-size: 0.66rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(42, 26, 14, 0.5);
        margin-bottom: 0.45rem;
      }
      .card-meta .slash { font-weight: 300; }
      .card-meta .num   { color: rgba(42, 26, 14, 0.7); }
      .card-title {
        font-family: var(--font-display);
        font-size: 2.4rem;
        letter-spacing: 0.06em;
        line-height: 1;
        color: var(--ink);
        margin: 0 0 0.6rem;
      }
      .card-desc {
        font-weight: 400;
        font-size: 0.82rem;
        line-height: 1.45;
        color: rgba(42, 26, 14, 0.78);
        margin: 0;
      }

      .card-progress {
        position: absolute;
        bottom: calc(env(safe-area-inset-bottom, 0) + 2rem);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.55rem;
      }
      .card-progress .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: rgba(253, 246, 227, 0.3);
        transition: background var(--t-fast), width var(--t-fast);
      }
      .card-progress .dot.is-on {
        background: #fdf6e3;
        width: 20px; border-radius: 3px;
      }
      .card-tap-hint {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0) + 1.4rem);
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.66rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.55);
      }

      /* ----------  STATE 6 · COMMUNITY POPUP  ---------- */
      #screen-community {
        background:
          linear-gradient(rgba(10, 7, 3, 0.5), rgba(10, 7, 3, 0.5)),
          url('./assets/landscape.jpg') center/cover;
      }
      .popup {
        background: var(--cream);
        border: 2px solid var(--teal);
        border-radius: 16px;
        padding: 2.4rem 1.8rem 1.6rem;
        width: min(80vw, 300px);
        text-align: center;
        position: relative;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        transform: scale(0.92);
        opacity: 0;
        transition: transform var(--t-slow) var(--ease-out),
                    opacity var(--t-slow) var(--ease-out);
      }
      .is-active .popup { transform: scale(1); opacity: 1; }
      .popup-mark {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 36px;
        border-radius: 50%;
        background: var(--cream);
        border: 2px solid var(--teal);
        display: grid;
        place-items: center;
        font-family: var(--font-display);
        font-size: 1.4rem;
        color: var(--orange);
      }
      .popup-num {
        font-family: var(--font-display);
        font-size: 3.6rem;
        line-height: 1;
        letter-spacing: 0.04em;
        color: var(--orange);
        margin: 0.4rem 0 0.7rem;
      }
      .popup-line {
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(42, 26, 14, 0.7);
        line-height: 1.55;
        margin: 0 0 1.5rem;
      }
      .popup-title {
        font-family: var(--font-display);
        font-size: 1.7rem;
        letter-spacing: 0.06em;
        color: var(--ink);
        margin: 0 0 1.4rem;
      }
      .popup-cta {
        display: block;
        width: 100%;
        font-family: var(--font-display);
        font-size: 1.05rem;
        letter-spacing: 0.16em;
        color: #fdf6e3;
        background: var(--orange);
        padding: 0.85rem 1rem;
        border-radius: 999px;
        margin-bottom: 0.6rem;
        transition: transform var(--t-fast) var(--ease);
      }
      .popup-cta:active { transform: scale(0.98); }
      .popup-dismiss {
        display: block;
        width: 100%;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--ink-soft);
        background: rgba(42, 26, 14, 0.06);
        padding: 0.78rem 1rem;
        border-radius: 999px;
      }

      /* Restart button shown on every screen except intro */
      .restart-btn {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0) + 1rem);
        left: 1rem;
        z-index: 100;
        width: 36px; height: 36px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        color: rgba(253, 246, 227, 0.65);
        font-size: 1rem;
        display: none;
        place-items: center;
        border: 1px solid rgba(253, 246, 227, 0.18);
      }
      body:not([data-state="intro"]) .restart-btn { display: grid; }
    </style>
  </head>

  <body data-state="intro">

    <!-- ============================================================
         AR SCENE  ·  camera feed always visible behind everything.
         The valley animations on the can label trigger when the user
         enters the 'valley' state.
         ============================================================ -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 4;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets timeout="30000">
        <img id="img-landscape" src="./assets/landscape.jpg"    crossorigin="anonymous" />
        <img id="img-wheat"     src="./assets/wheat-orange.png" crossorigin="anonymous" />
        <img id="img-brewery"   src="./assets/brewery.png"      crossorigin="anonymous" />
        <img id="img-sun"       src="./assets/sun-rays.png"     crossorigin="anonymous" />
        <img id="img-mtns"      src="./assets/sun-mountains.png" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity light="type: ambient; color: #ffd9a0; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; color: #fff2c8; intensity: 0.5" position="0.5 1 1"></a-entity>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-entity id="valley-scene" billboard position="0 0 0">
          <a-image src="#img-landscape"
            position="0 0 -0.05" scale="0.8 1.6 1" opacity="0" transparent="true"
            animation__op="property: opacity; to: 0.75; dur: 1400; easing: easeOutCubic; startEvents: ar-enter"
            animation__exit_op="property: opacity; to: 0; dur: 500; startEvents: ar-exit"></a-image>
          <a-entity id="particles">
            <a-circle radius="0.006" color="#ffd07a" opacity="0" position="-0.15 -0.25 0.01"
              animation__up="property: position; from: -0.15 -0.3 0.01; to: -0.18 0.4 0.01; dur: 6500; loop: true; easing: linear; delay: 1500; startEvents: ar-enter"
              animation__fade="property: opacity; from: 0; to: 0.85; dur: 1800; dir: alternate; loop: true; delay: 1500; startEvents: ar-enter"></a-circle>
            <a-circle radius="0.004" color="#fff0c2" opacity="0" position="0.13 -0.25 0.01"
              animation__up="property: position; from: 0.13 -0.3 0.01; to: 0.1 0.45 0.01; dur: 7500; loop: true; easing: linear; delay: 2300; startEvents: ar-enter"
              animation__fade="property: opacity; from: 0; to: 0.7; dur: 2100; dir: alternate; loop: true; delay: 2300; startEvents: ar-enter"></a-circle>
            <a-circle radius="0.007" color="#ffb86c" opacity="0" position="0.02 -0.25 0.01"
              animation__up="property: position; from: 0.02 -0.3 0.01; to: 0.04 0.42 0.01; dur: 8200; loop: true; easing: linear; delay: 1900; startEvents: ar-enter"
              animation__fade="property: opacity; from: 0; to: 0.8; dur: 2500; dir: alternate; loop: true; delay: 1900; startEvents: ar-enter"></a-circle>
            <a-circle radius="0.005" color="#ffd07a" opacity="0" position="-0.07 -0.25 0.01"
              animation__up="property: position; from: -0.07 -0.3 0.01; to: -0.09 0.46 0.01; dur: 7000; loop: true; easing: linear; delay: 2700; startEvents: ar-enter"
              animation__fade="property: opacity; from: 0; to: 0.75; dur: 1900; dir: alternate; loop: true; delay: 2700; startEvents: ar-enter"></a-circle>
            <a-circle radius="0.005" color="#ffe4a3" opacity="0" position="0.2 -0.25 0.01"
              animation__up="property: position; from: 0.2 -0.3 0.01; to: 0.18 0.44 0.01; dur: 9000; loop: true; easing: linear; delay: 3100; startEvents: ar-enter"
              animation__fade="property: opacity; from: 0; to: 0.7; dur: 2300; dir: alternate; loop: true; delay: 3100; startEvents: ar-enter"></a-circle>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <!-- ============================================================
         STATE 1 · INTRO
         ============================================================ -->
    <section id="screen-intro" class="screen is-active">
      <div class="intro-inner">
        <h1 class="intro-mark" data-copy="intro.mark">Hello!</h1>
        <p class="intro-sub"   data-copy="intro.sub">Ready for a new experience?</p>
        <button class="intro-cta" id="start-btn" data-copy="intro.cta">Scan to enter</button>
        <p class="intro-hint" data-copy="intro.hint">No app needed · Camera will open</p>
      </div>
    </section>

    <!-- ============================================================
         STATE 2 · SCANNING
         ============================================================ -->
    <section id="screen-scan" class="screen">
      <div class="scan-frame">
        <i></i><i></i>
        <div class="scan-hint" data-copy="scan.hint">
          Find the can
          <em data-copy="scan.sub">Frame it within</em>
        </div>
      </div>
      <button class="dev-skip" id="dev-skip">Skip detect →</button>
    </section>

    <!-- ============================================================
         STATE 3 · DETECTED PROMPT
         ============================================================ -->
    <section id="screen-detected" class="screen">
      <div class="prompt-card">
        <p class="prompt-eyebrow">
          <span data-copy="detected.eyebrow1">Can</span>
          <span class="dot">·</span>
          <span data-copy="detected.eyebrow2">Detected</span>
        </p>
        <h2 class="prompt-title"  data-copy="detected.title">Welcome</h2>
        <p  class="prompt-sub"    data-copy="detected.sub">A small ceremony before the first sip.</p>
        <button class="prompt-cta" id="detected-cta" data-copy="detected.cta">Tap to continue</button>
        <p  class="prompt-tag"    data-copy="detected.tag">No app needed</p>
      </div>
    </section>

    <!-- ============================================================
         STATE 4 · VALLEY
         ============================================================ -->
    <section id="screen-valley" class="screen">
      <div class="valley-hint" data-copy="valley.hint">Tap to continue</div>
    </section>

    <!-- ============================================================
         STATE 5 · CARDS
         ============================================================ -->
    <section id="screen-cards" class="screen">
      <div class="card-tap-hint" data-copy="cards.tap">Tap to continue</div>
      <div class="card-stage" id="card-stage"></div>
      <div class="card-progress" id="card-progress"></div>
    </section>

    <!-- ============================================================
         STATE 6 · COMMUNITY POPUP
         ============================================================ -->
    <section id="screen-community" class="screen">
      <div class="popup">
        <div class="popup-mark">○</div>
        <div class="popup-num" data-copy="community.num">7,243</div>
        <p class="popup-line"  data-copy="community.line">People already gathered around this mesa</p>
        <h3 class="popup-title" data-copy="community.title">Leave your trace?</h3>
        <button class="popup-cta"     id="community-join" data-copy="community.cta">Join the community</button>
        <button class="popup-dismiss" id="community-skip" data-copy="community.skip">Maybe later</button>
      </div>
    </section>

    <button class="restart-btn" id="restart-btn" title="Restart">↺</button>

    <script>
      /* ============================================================
         CONTENT  ·  ALL editable copy lives here
         ============================================================ */
      const CONTENT = {
        intro: {
          mark:  'Welcome',
          sub:   'Are You Ready?',
          cta:   'Scan to enter',
          hint:  'No app needed · Camera will open',
        },
        scan: {
          hint:  'Find the can',
          sub:   'Frame it within',
        },
        detected: {
          eyebrow1: 'Beer',
          eyebrow2: 'Detected',
          title:    'Welcome',
          sub:      'A small ceremony before the first sip.',
          cta:      'Tap to continue',
          tag:      'No app needed',
        },
        valley: { hint: 'Tap to continue' },
        cards: {
          tap: 'Tap to continue',
          items: [
            { number: '01', label: 'The beer',       title: 'ALBA',
              desc:  'Soft wheat, bright citrus, mid-morning sun.',
              color: 'orange', image: './assets/can.png' },
            { number: '02', label: 'The ingredient', title: 'NARANJA',
              desc:  'Valencia oranges, picked at the end of winter.',
             color: 'olive',  image: './assets/wheat-orange.png' },
            { number: '03', label: 'The valley',     title: 'ZARRA',
              desc:  'A village of 400, a brewery, and a river.',
              color: 'amber',  image: './assets/sun-mountains.png' },
            { number: '04', label: 'The brewer',     title: 'AITOR',
              desc:  'Third generation. Vive grande, vive libre.',
              color: 'sage',   image: './assets/brewery.png' },
          ],
        },
        community: {
          num:    '7,243',
          line:   'People already gathered around this mesa',
          title:  'Leave your trace?',
          cta:    'Join the community',
          skip:   'Maybe later',
          joinUrl: 'https://www.cerveceriadezarra.es',
        },
      };

      /* Substitute copy from CONTENT into every [data-copy="path.to.key"] */
      document.querySelectorAll('[data-copy]').forEach((el) => {
        const path = el.getAttribute('data-copy').split('.');
        let v = CONTENT;
        for (const k of path) v = v && v[k];
        if (v != null) el.textContent = v;
      });

      /* ============================================================
         CARD RENDERING
         ============================================================ */
      const cardStage    = document.getElementById('card-stage');
      const cardProgress = document.getElementById('card-progress');

      CONTENT.cards.items.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.card  = i;
        el.dataset.color = c.color;
        el.innerHTML = `
          <div class="card-art"><img src="${c.image}" alt="${c.title}"></div>
          <div class="card-meta">
            <span class="slash">/</span>
            <span class="num">${c.number}</span>
            <span>·</span>
            <span>${c.label}</span>
          </div>
          <h2 class="card-title">${c.title}</h2>
          <p class="card-desc">${c.desc}</p>
        `;
        cardStage.appendChild(el);

        const dot = document.createElement('span');
        dot.className = 'dot';
        cardProgress.appendChild(dot);
      });

      /* ============================================================
         STATE MACHINE
         ============================================================ */
      const STATES = ['intro', 'scan', 'detected', 'valley', 'cards', 'community'];
      let state = 'intro';
      let cardIndex = 0;

      const body   = document.body;
      const scene  = document.querySelector('a-scene');
      const target = document.querySelector('#target');

      function goTo(next) {
        if (next === state) return;
        if (next === 'valley') {
          target.querySelectorAll('a-image, a-circle').forEach((c) =>
            c.dispatchEvent(new CustomEvent('ar-enter'))
          );
        }
        if (state === 'valley' && next !== 'valley') {
          target.querySelectorAll('a-image, a-circle').forEach((c) =>
            c.dispatchEvent(new CustomEvent('ar-exit'))
          );
        }
        document.querySelectorAll('.screen').forEach((s) => s.classList.remove('is-active'));
        document.getElementById('screen-' + next).classList.add('is-active');
        body.dataset.state = next;
        state = next;
      }

      function showCard(idx) {
        cardIndex = idx;
        document.querySelectorAll('.card').forEach((el, i) => {
          el.classList.toggle('is-current', i === idx);
          el.classList.toggle('is-past',    i <  idx);
        });
        document.querySelectorAll('.card-progress .dot').forEach((d, i) => {
          d.classList.toggle('is-on', i === idx);
        });
      }

      /* ============================================================
         WIRING
         ============================================================ */
      document.getElementById('start-btn').addEventListener('click', async () => {
        goTo('scan');
        const startMindAR = async () => {
          try {
            const sys = scene.systems['mindar-image-system'];
            if (sys && sys.start) await sys.start();
          } catch (e) {
            console.error('mindar start failed:', e);
            alert('Could not start the camera. Please allow camera access and reload.');
          }
        };
        if (scene.hasLoaded) await startMindAR();
        else scene.addEventListener('loaded', startMindAR, { once: true });
      });

      target.addEventListener('targetFound', () => {
        if (state === 'scan') goTo('detected');
      });
      target.addEventListener('targetLost', () => {
        if (state === 'detected') goTo('scan');
      });

      document.getElementById('detected-cta').addEventListener('click', () => goTo('valley'));

      document.getElementById('screen-valley').addEventListener('click', () => {
        goTo('cards');
        showCard(0);
      });

      document.getElementById('screen-cards').addEventListener('click', (e) => {
        if (e.target.closest('.restart-btn')) return;
        if (cardIndex < CONTENT.cards.items.length - 1) showCard(cardIndex + 1);
        else goTo('community');
      });

      document.getElementById('community-join').addEventListener('click', () => {
        if (CONTENT.community.joinUrl) {
          window.open(CONTENT.community.joinUrl, '_blank', 'noopener');
        }
      });
      document.getElementById('community-skip').addEventListener('click', restart);
      document.getElementById('restart-btn').addEventListener('click', restart);

      function restart() {
        cardIndex = 0;
        showCard(0);
        goTo('scan');
      }

      /* ============================================================
         DEBUG MODE  ·  add ?debug to the URL
            ← / →  cycle states
            Skip button appears in scan state
         ============================================================ */
      if (location.search.includes('debug')) {
        body.classList.add('is-debug');
        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') advance();
          else if (e.key === 'ArrowLeft')              retreat();
        });
        document.getElementById('dev-skip').addEventListener('click', () => {
          if (state === 'scan') goTo('detected');
        });
      }
      function advance() {
        if      (state === 'intro')    document.getElementById('start-btn').click();
        else if (state === 'scan')     goTo('detected');
        else if (state === 'detected') goTo('valley');
        else if (state === 'valley')   { goTo('cards'); showCard(0); }
        else if (state === 'cards') {
          if (cardIndex < CONTENT.cards.items.length - 1) showCard(cardIndex + 1);
          else goTo('community');
        }
        else if (state === 'community') restart();
      }
      function retreat() {
        const i = STATES.indexOf(state);
        if (i > 0) goTo(STATES[i - 1]);
      }

      /* HTTPS guard ---------------------------------------------- */
      if (
        location.protocol !== 'https:' &&
        location.hostname !== 'localhost' &&
        location.hostname !== '127.0.0.1'
      ) {
        const warn = document.createElement('div');
        warn.style.cssText =
          'position:fixed;top:0;left:0;right:0;padding:.6rem 1rem;background:#7a2418;color:#fff;font:600 .75rem system-ui;z-index:999;text-align:center;letter-spacing:.06em;';
        warn.textContent = 'WebAR needs HTTPS — open this page over https:// or localhost.';
        document.body.appendChild(warn);
      }
    </script>
  </body>
</html>
