<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1208" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zarra · Alba AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Megrim&family=Nunito:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --orange:   #E48043;
        --olive:    #9C963A;
        --amber:    #D9A032;
        --sage:     #8FA38C;
        --paper:    #FBF5E6;
        --ink:      #2A1A0E;
        --ink-soft: rgba(42, 26, 14, 0.6);
        --bg:       #1a1208;

        --font-display: 'Megrim', cursive;
        --font-body:    'Nunito', system-ui, sans-serif;

        --t-fast: 180ms;
        --t-med:  360ms;
        --ease:   cubic-bezier(0.16, 1, 0.3, 1);
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        overflow: hidden;
        background: #000;
        font-family: var(--font-body);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      button {
        appearance: none; border: 0; background: 0; cursor: pointer;
        font: inherit; color: inherit;
      }

      /* =========  AR scene sits behind everything  ========= */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        z-index: 1;
      }

      /* =========  SCREEN SYSTEM  ========= */
      .screen {
        position: fixed; inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        padding: 1.2rem;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity var(--t-med) var(--ease),
          visibility var(--t-med) var(--ease);
      }
      .screen.is-active {
        opacity: 1; visibility: visible;
        pointer-events: auto;
      }

      /* =========  INTRO  ========= */
      #screen-intro {
        z-index: 50;
        background:
          radial-gradient(ellipse at 50% 38%, #3a240e 0%, #1a1208 70%),
          var(--bg);
        text-align: center;
      }
      .intro-mark {
        font-family: var(--font-display);
        font-size: clamp(2.6rem, 12vw, 4.2rem);
        letter-spacing: 0.18em;
        color: #fdf6e3;
        margin: 0 0 0.4rem;
      }
      .intro-sub {
        font-weight: 300; font-style: italic;
        font-size: clamp(0.85rem, 3.4vw, 1rem);
        color: rgba(253, 246, 227, 0.6);
        margin: 0 0 2.2rem;
        letter-spacing: 0.08em;
      }
      .intro-cta {
        font-family: var(--font-display);
        font-size: clamp(1rem, 4vw, 1.3rem);
        letter-spacing: 0.22em;
        color: #fdf6e3;
        background: var(--orange);
        padding: 0.9rem 2.2rem;
        border-radius: 999px;
        box-shadow: 0 8px 28px rgba(228, 128, 67, 0.35);
      }
      .intro-cta:active { transform: translateY(1px) scale(0.98); }
      .intro-hint {
        margin-top: 1.6rem;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.4);
      }

      /* =========  SCAN  ========= */
      #screen-scan { background: transparent; }
      .scan-frame {
        position: relative;
        width: min(70vw, 280px);
        aspect-ratio: 0.62;
        border: 1px solid rgba(253, 246, 227, 0.45);
        animation: scan-pulse 2.4s ease-in-out infinite;
      }
      .scan-frame::before, .scan-frame::after,
      .scan-frame > i:nth-child(1), .scan-frame > i:nth-child(2) {
        content: '';
        position: absolute;
        width: 22px; height: 22px;
        border: 2px solid var(--orange);
      }
      .scan-frame::before { top: -1px; left:  -1px; border-right: 0; border-bottom: 0; }
      .scan-frame::after  { top: -1px; right: -1px; border-left:  0; border-bottom: 0; }
      .scan-frame > i:nth-child(1) { bottom: -1px; left:  -1px; border-right: 0; border-top: 0; }
      .scan-frame > i:nth-child(2) { bottom: -1px; right: -1px; border-left:  0; border-top: 0; }
      .scan-hint {
        position: absolute;
        top: calc(100% + 1.6rem);
        left: 50%; transform: translateX(-50%);
        font-family: var(--font-display);
        font-size: clamp(1rem, 4vw, 1.3rem);
        letter-spacing: 0.18em;
        color: #fdf6e3;
        white-space: nowrap;
        text-align: center;
      }
      .scan-hint em {
        display: block;
        font-family: var(--font-body);
        font-style: normal;
        font-weight: 300;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.5);
        margin-top: 0.5rem;
      }
      @keyframes scan-pulse {
        0%, 100% { transform: scale(1);     opacity: 1;    }
        50%      { transform: scale(1.035); opacity: 0.55; }
      }

      /* =========  DETECTED PROMPT  ========= */
      #screen-detected { background: rgba(10, 7, 3, 0.45); }
      .prompt-card {
        background: var(--paper);
        border-radius: 18px;
        padding: 1.8rem 1.6rem 1.4rem;
        width: min(86vw, 320px);
        text-align: center;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }
      .prompt-eyebrow {
        font-size: 0.66rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 0 0 0.9rem;
      }
      .prompt-title {
        font-family: var(--font-display);
        font-size: clamp(2rem, 8vw, 2.6rem);
        letter-spacing: 0.08em;
        margin: 0 0 0.5rem;
      }
      .prompt-sub {
        font-size: 0.92rem;
        line-height: 1.45;
        color: var(--ink-soft);
        margin: 0 0 1.4rem;
      }
      .prompt-cta {
        display: block;
        width: 100%;
        padding: 0.85rem 1rem;
        font-family: var(--font-display);
        font-size: 1rem;
        letter-spacing: 0.2em;
        color: #fdf6e3;
        background: var(--orange);
        border-radius: 999px;
      }
      .prompt-cta:active { transform: translateY(1px) scale(0.98); }
      .prompt-tag {
        margin-top: 1rem;
        font-size: 0.62rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(42, 26, 14, 0.35);
      }

      /* =========  VALLEY (FULLSCREEN VIDEO)  ========= */
      #screen-valley {
        background: #000;
        padding: 0;
      }
      .valley-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }
      .valley-hint {
        position: absolute;
        bottom: calc(env(safe-area-inset-bottom, 0) + 1.6rem);
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-display);
        font-size: clamp(0.95rem, 3.8vw, 1.2rem);
        letter-spacing: 0.22em;
        color: #fdf6e3;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        animation: valley-pulse 2s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes valley-pulse {
        0%, 100% { opacity: 0.65; }
        50%      { opacity: 1;    }
      }

      /* =========  CARDS  ========= */
      #screen-cards {
        background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.85));
        place-items: stretch;
        padding: 0;
      }
      .card-stage {
        position: relative;
        width: 100%; height: 100%;
        display: grid;
        place-items: center;
      }
      .card {
        position: absolute;
        width: min(86vw, 340px);
        background: var(--paper);
        border-radius: 22px;
        padding: 1.4rem 1.4rem 1.6rem;
        text-align: center;
        opacity: 0;
        transform: translateY(40px) scale(0.94);
        transition:
          opacity var(--t-med) var(--ease),
          transform var(--t-med) var(--ease);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }
      .card.is-current {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .card.is-past {
        opacity: 0;
        transform: translateY(-30px) scale(0.94);
      }
      .card[data-color="orange"] { border-top: 4px solid var(--orange); }
      .card[data-color="olive"]  { border-top: 4px solid var(--olive); }
      .card[data-color="amber"]  { border-top: 4px solid var(--amber); }
      .card[data-color="sage"]   { border-top: 4px solid var(--sage); }
      .card-art {
        width: 60%;
        margin: 0 auto 0.9rem;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
      }
      .card-art img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
      }
      .card-meta {
        font-size: 0.66rem;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 0 0 0.5rem;
      }
      .card-title {
        font-family: var(--font-display);
        font-size: clamp(1.8rem, 7vw, 2.4rem);
        letter-spacing: 0.1em;
        margin: 0 0 0.5rem;
      }
      .card-desc {
        font-size: 0.92rem;
        line-height: 1.45;
        color: var(--ink-soft);
        margin: 0;
      }
      .card-tap-hint {
        position: absolute;
        bottom: calc(env(safe-area-inset-bottom, 0) + 1.2rem);
        left: 50%; transform: translateX(-50%);
        font-size: 0.66rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(253, 246, 227, 0.55);
      }
      .card-progress {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0) + 1.2rem);
        left: 50%; transform: translateX(-50%);
        display: flex;
        gap: 0.4rem;
      }
      .card-progress .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: rgba(253, 246, 227, 0.3);
      }
      .card-progress .dot.is-on { background: var(--orange); }

      /* =========  COMMUNITY  ========= */
      #screen-community { background: #1a1208; }
      .popup {
        background: var(--paper);
        border-radius: 22px;
        padding: 1.8rem 1.6rem 1.5rem;
        width: min(86vw, 320px);
        text-align: center;
      }
      .popup-num {
        font-family: var(--font-display);
        font-size: clamp(2.6rem, 11vw, 3.4rem);
        color: var(--orange);
        margin: 0;
      }
      .popup-line {
        font-size: 0.88rem;
        color: var(--ink-soft);
        margin: 0.3rem 0 1rem;
      }
      .popup-title {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 6.5vw, 2rem);
        letter-spacing: 0.08em;
        margin: 0 0 1.2rem;
      }
      .popup-cta {
        display: block;
        width: 100%;
        padding: 0.85rem 1rem;
        font-family: var(--font-display);
        font-size: 1rem;
        letter-spacing: 0.2em;
        color: #fdf6e3;
        background: var(--orange);
        border-radius: 999px;
        margin-bottom: 0.7rem;
      }
      .popup-dismiss {
        width: 100%;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        color: var(--ink-soft);
        padding: 0.6rem;
      }

      /* =========  GLOBAL CONTROLS  ========= */
      .restart-btn {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0) + 1rem);
        left: 1rem;
        z-index: 100;
        width: 36px; height: 36px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        color: rgba(253, 246, 227, 0.65);
        font-size: 1rem;
        display: none;
        place-items: center;
        border: 1px solid rgba(253, 246, 227, 0.18);
      }
      body:not([data-state="intro"]) .restart-btn { display: grid; }
    </style>
  </head>

  <body data-state="intro">

    <!-- =========  AR SCENE  ·  detection only, no 3D content  ========= -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 4;"
      renderer="alpha: true; antialias: false; precision: mediump"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <!-- =========  INTRO  ========= -->
    <section id="screen-intro" class="screen is-active">
      <div>
        <h1 class="intro-mark">WELCOME</h1>
        <p class="intro-sub">Are you ready?</p>
        <button class="intro-cta" id="start-btn">Scan to enter</button>
        <p class="intro-hint">No app needed · Camera will open</p>
      </div>
    </section>

    <!-- =========  SCAN  ========= -->
    <section id="screen-scan" class="screen">
      <div class="scan-frame">
        <i></i><i></i>
        <div class="scan-hint">Find the can<em>Frame it within</em></div>
      </div>
    </section>

    <!-- =========  DETECTED  ========= -->
    <section id="screen-detected" class="screen">
      <div class="prompt-card">
        <p class="prompt-eyebrow">Alba · Detected</p>
        <h2 class="prompt-title">Welcome</h2>
        <p class="prompt-sub">A small ceremony before the first sip.</p>
        <button class="prompt-cta" id="detected-cta">Tap to continue</button>
        <p class="prompt-tag">No app needed</p>
      </div>
    </section>

    <!-- =========  VALLEY · fullscreen MP4  ========= -->
    <section id="screen-valley" class="screen">
      <video
        id="valley-video"
        class="valley-video"
        src="./assets/valley-video.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
      ></video>
      <div class="valley-hint">Tap to continue</div>
    </section>

    <!-- =========  CARDS  ========= -->
    <section id="screen-cards" class="screen">
      <div class="card-progress" id="card-progress"></div>
      <div class="card-stage" id="card-stage"></div>
      <div class="card-tap-hint">Tap to continue</div>
    </section>

    <!-- =========  COMMUNITY  ========= -->
    <section id="screen-community" class="screen">
      <div class="popup">
        <div class="popup-num">7,243</div>
        <p class="popup-line">People already gathered around this mesa</p>
        <h3 class="popup-title">Leave your trace?</h3>
        <button class="popup-cta" id="community-join">Join the community</button>
        <button class="popup-dismiss" id="community-skip">Maybe later</button>
      </div>
    </section>

    <button class="restart-btn" id="restart-btn" title="Restart">↺</button>

    <script>
      /* =========  CONTENT  ========= */
      const CARDS = [
        { num: '01', label: 'The beer',       title: 'ALBA',    desc: 'Soft wheat, bright citrus, mid-morning sun.',          color: 'orange', image: './assets/can.png' },
        { num: '02', label: 'The ingredient', title: 'NARANJA', desc: 'Valencia oranges, picked at the end of winter.',       color: 'olive',  image: './assets/wheat-orange.png' },
        { num: '03', label: 'The valley',     title: 'ZARRA',   desc: 'A village of 400, a brewery, and a river.',            color: 'amber',  image: './assets/sun-mountains.png' },
        { num: '04', label: 'The brewer',     title: 'AITOR',   desc: 'Third generation. Vive grande, vive libre.',           color: 'sage',   image: './assets/brewery.png' },
      ];

      const JOIN_URL = 'https://www.cerveceriadezarra.es';

      /* =========  CARD RENDERING  ========= */
      const cardStage    = document.getElementById('card-stage');
      const cardProgress = document.getElementById('card-progress');
      CARDS.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.color = c.color;
        el.dataset.card  = i;
        el.innerHTML = `
          <div class="card-art"><img src="${c.image}" alt="${c.title}"></div>
          <div class="card-meta">/ ${c.num} · ${c.label}</div>
          <h2 class="card-title">${c.title}</h2>
          <p class="card-desc">${c.desc}</p>
        `;
        cardStage.appendChild(el);
        const dot = document.createElement('span');
        dot.className = 'dot';
        cardProgress.appendChild(dot);
      });

      /* =========  STATE MACHINE  ========= */
      const STATES = ['intro', 'scan', 'detected', 'valley', 'cards', 'community'];
      let state = 'intro';
      let cardIndex = 0;

      const body   = document.body;
      const scene  = document.querySelector('a-scene');
      const target = document.getElementById('target');
      const video  = document.getElementById('valley-video');

      function setScreen(next) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));
        document.getElementById('screen-' + next).classList.add('is-active');
        body.dataset.state = next;
        state = next;
      }

      function goTo(next) {
        if (next === state) return;
        if (next === 'valley') playValley();
        else pauseValley();
        setScreen(next);
      }

      function playValley() {
        try { video.currentTime = 0; } catch (e) {}
        const p = video.play();
        if (p && p.catch) p.catch(err => console.warn('valley video play failed:', err));
      }

      function pauseValley() {
        try { video.pause(); } catch (e) {}
      }

      function showCard(idx) {
        cardIndex = idx;
        document.querySelectorAll('.card').forEach((el, i) => {
          el.classList.toggle('is-current', i === idx);
          el.classList.toggle('is-past',    i <  idx);
        });
        document.querySelectorAll('.card-progress .dot').forEach((d, i) => {
          d.classList.toggle('is-on', i === idx);
        });
      }

      /* =========  WIRING  ========= */
      document.getElementById('start-btn').addEventListener('click', async () => {
        // Unlock video playback inside the user gesture
        try {
          video.muted = true;
          video.playsInline = true;
          await video.play();
          video.pause();
          video.currentTime = 0;
        } catch (e) {
          console.warn('video prime failed:', e);
        }

        setScreen('scan');

        const startMindAR = async () => {
          try {
            const sys = scene.systems['mindar-image-system'];
            if (sys && sys.start) await sys.start();
          } catch (err) {
            console.error('mindar start failed:', err);
            alert('Could not start the camera. Please allow camera access and reload.');
          }
        };
        if (scene.hasLoaded) startMindAR();
        else scene.addEventListener('loaded', startMindAR, { once: true });
      });

      target.addEventListener('targetFound', () => {
        if (state === 'scan') goTo('detected');
      });
      target.addEventListener('targetLost', () => {
        if (state === 'detected') goTo('scan');
      });

      document.getElementById('detected-cta').addEventListener('click', () => goTo('valley'));

      document.getElementById('screen-valley').addEventListener('click', () => {
        goTo('cards');
        showCard(0);
      });

      document.getElementById('screen-cards').addEventListener('click', (e) => {
        if (e.target.closest('.restart-btn')) return;
        if (cardIndex < CARDS.length - 1) showCard(cardIndex + 1);
        else goTo('community');
      });

      document.getElementById('community-join').addEventListener('click', () => {
        window.open(JOIN_URL, '_blank', 'noopener');
      });
      document.getElementById('community-skip').addEventListener('click', restart);
      document.getElementById('restart-btn').addEventListener('click', restart);

      function restart() {
        cardIndex = 0;
        showCard(0);
        goTo('scan');
      }

      /* =========  HTTPS GUARD  ========= */
      if (
        location.protocol !== 'https:' &&
        location.hostname !== 'localhost' &&
        location.hostname !== '127.0.0.1'
      ) {
        const warn = document.createElement('div');
        warn.style.cssText =
          'position:fixed;top:0;left:0;right:0;padding:.6rem 1rem;background:#7a2418;color:#fff;font:600 .75rem system-ui;z-index:999;text-align:center;letter-spacing:.06em;';
        warn.textContent = 'WebAR needs HTTPS — open this page over https:// or localhost.';
        document.body.appendChild(warn);
      }
    </script>
  </body>
</html>
