<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Zarra · Alba AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!--
    ════════════════════════════════════════════════════════════════
    CUSTOM COMPONENT — must register BEFORE MindAR loads.
    Creates a VideoTexture, mounts it on the plane's mesh material,
    and forces texture.needsUpdate every tick (required on iOS).
    ════════════════════════════════════════════════════════════════
  -->
  <script>
    AFRAME.registerComponent('ar-video-surface', {
      schema: { src: { type: 'selector' } },

      init: function () {
        var video = this.data.src;
        if (!video) {
          console.warn('ar-video-surface: no video element supplied');
          return;
        }

        var tex = new THREE.VideoTexture(video);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;

        var mat = new THREE.MeshBasicMaterial({
          map: tex,
          side: THREE.DoubleSide,
          toneMapped: false,
          transparent: false
        });

        this.texture  = tex;
        this.material = mat;
        this.applied  = false;

        var self = this;
        var apply = function () {
          var mesh = self.el.getObject3D('mesh');
          if (!mesh) { return; }
          mesh.traverse(function (n) { if (n.isMesh) { n.material = mat; } });
          self.applied = true;
        };

        this.el.addEventListener('object3dset', apply);
        apply();
      },

      tick: function () {
        if (this.texture && this.applied) {
          this.texture.needsUpdate = true;
        } else if (!this.applied) {
          // Re-apply if mesh wasn't ready at init time
          var mesh = this.el.getObject3D('mesh');
          if (mesh) {
            var mat = this.material;
            mesh.traverse(function (n) { if (n.isMesh) { n.material = mat; } });
            this.applied = true;
          }
        }
      },

      remove: function () {
        if (this.texture)  { this.texture.dispose(); }
        if (this.material) { this.material.dispose(); }
      }
    });
  </script>

  <!-- MindAR after our component -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Megrim&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --orange: #E48043;
      --olive:  #9C963A;
      --amber:  #D9A032;
      --sage:   #8FA38C;
      --paper:  #FBF5E6;
      --ink:    #2A1A0E;
      --muted:  rgba(42,26,14,0.6);
      --bg:     #1a1208;
      --fd:     'Megrim', cursive;
      --fb:     'Nunito', system-ui, sans-serif;
      --ease:   cubic-bezier(0.16,1,0.3,1);
    }

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: var(--fb);
      -webkit-font-smoothing: antialiased;
    }
    button { appearance: none; border: 0; background: none; cursor: pointer; font: inherit; color: inherit; }

    /* ─────────  AR scene is the always-present base layer  ───────── */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1;
    }

    /* ─────────  OVERLAY SYSTEM  ─────────
       Every UI screen is a fixed div above the AR scene.
       Opacity/visibility transitions only — the AR scene
       beneath them never unmounts.
    ─────────────────────────────────────── */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 320ms var(--ease), visibility 320ms var(--ease);
    }
    .ui.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    /* Transparent UI screens keep AR visible underneath */
    .ui.transparent { background: transparent; }

    /* ─────────  INTRO  ───────── */
    #ui-intro {
      z-index: 50;
      background: radial-gradient(ellipse at 50% 38%, #3a240e 0%, #1a1208 70%);
      text-align: center;
    }
    .intro-title {
      font-family: var(--fd);
      font-size: clamp(2.8rem, 11vw, 4.4rem);
      letter-spacing: 0.18em;
      color: #fdf6e3;
      margin: 0 0 0.3rem;
    }
    .intro-sub {
      font-weight: 300; font-style: italic;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      letter-spacing: 0.08em;
      color: rgba(253,246,227,0.6);
      margin: 0 0 2rem;
    }
    .btn-primary {
      font-family: var(--fd);
      font-size: clamp(1rem, 4vw, 1.25rem);
      letter-spacing: 0.22em;
      color: #fdf6e3;
      background: var(--orange);
      padding: 0.9rem 2.2rem;
      border-radius: 999px;
      box-shadow: 0 8px 28px rgba(228,128,67,0.35);
      transition: transform 150ms;
    }
    .btn-primary:active { transform: scale(0.97); }
    .intro-hint {
      margin-top: 1.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(253,246,227,0.35);
    }

    /* ─────────  SCAN  ───────── */
    .scan-frame {
      position: relative;
      width: min(70vw, 280px);
      aspect-ratio: 0.62;
      border: 1px solid rgba(253,246,227,0.45);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .scan-frame::before, .scan-frame::after,
    .scan-frame > i:nth-child(1), .scan-frame > i:nth-child(2) {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border: 2px solid var(--orange);
    }
    .scan-frame::before          { top:-1px;    left:-1px;   border-right: 0; border-bottom: 0; }
    .scan-frame::after           { top:-1px;    right:-1px;  border-left: 0;  border-bottom: 0; }
    .scan-frame > i:nth-child(1) { bottom:-1px; left:-1px;   border-right: 0; border-top: 0; }
    .scan-frame > i:nth-child(2) { bottom:-1px; right:-1px;  border-left: 0;  border-top: 0; }
    .scan-label {
      position: absolute;
      top: calc(100% + 1.4rem);
      left: 50%; transform: translateX(-50%);
      font-family: var(--fd);
      font-size: clamp(1rem, 4vw, 1.25rem);
      letter-spacing: 0.18em;
      color: #fdf6e3;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .scan-label em {
      display: block;
      font-family: var(--fb);
      font-style: normal; font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(253,246,227,0.5);
      margin-top: 0.4rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.03); }
    }

    /* ─────────  DETECTED  ───────── */
    #ui-detected { background: rgba(0,0,0,0.45); }
    .det-card {
      background: var(--paper);
      border-radius: 18px;
      padding: 1.8rem 1.6rem 1.4rem;
      width: min(86vw, 320px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .det-eyebrow {
      font-size: 0.66rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.8rem;
    }
    .det-title {
      font-family: var(--fd);
      font-size: clamp(2rem, 8vw, 2.6rem);
      letter-spacing: 0.08em;
      color: var(--ink);
      margin: 0 0 0.4rem;
    }
    .det-sub {
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--muted);
      margin: 0 0 1.3rem;
    }
    .det-cta {
      display: block; width: 100%;
      font-family: var(--fd);
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #fdf6e3;
      background: var(--orange);
      padding: 0.85rem;
      border-radius: 999px;
    }
    .det-cta:active { transform: scale(0.97); }

    /* ─────────  VALLEY HINT (overlays the AR video plane)  ───────── */
    #ui-valley {
      justify-content: flex-end;
      padding-bottom: calc(env(safe-area-inset-bottom,0) + 2rem);
      pointer-events: none;
    }
    #ui-valley.show { pointer-events: auto; }
    .valley-hint {
      font-family: var(--fd);
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      letter-spacing: 0.22em;
      color: #fdf6e3;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ─────────  CARDS  ───────── */
    #ui-cards {
      background: rgba(10,7,3,0.85);
      padding: 0;
      align-items: stretch;
    }
    .cards-progress {
      position: absolute;
      top: calc(env(safe-area-inset-top,0) + 1rem);
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      z-index: 2;
    }
    .cards-progress .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(253,246,227,0.3);
      transition: background 200ms;
    }
    .cards-progress .dot.on { background: var(--orange); }
    .cards-stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      position: absolute;
      width: min(86vw, 340px);
      background: var(--paper);
      border-radius: 22px;
      padding: 1.4rem 1.4rem 1.6rem;
      text-align: center;
      opacity: 0;
      transform: translateY(40px) scale(0.94);
      transition: opacity 320ms var(--ease), transform 320ms var(--ease);
      box-shadow: 0 28px 70px rgba(0,0,0,0.45);
    }
    .card.is-current { opacity: 1; transform: none; }
    .card.is-past    { opacity: 0; transform: translateY(-28px) scale(0.94); }
    .card[data-color="orange"] { border-top: 4px solid var(--orange); }
    .card[data-color="olive"]  { border-top: 4px solid var(--olive); }
    .card[data-color="amber"]  { border-top: 4px solid var(--amber); }
    .card[data-color="sage"]   { border-top: 4px solid var(--sage); }
    .card-art {
      width: 58%; margin: 0 auto 0.9rem;
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .card-art img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .card-meta  { font-size: 0.65rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin: 0 0 0.4rem; }
    .card-title { font-family: var(--fd); font-size: clamp(1.8rem,7vw,2.4rem); letter-spacing: 0.1em; color: var(--ink); margin: 0 0 0.4rem; }
    .card-desc  { font-size: 0.9rem; line-height: 1.45; color: var(--muted); margin: 0; }
    .cards-tap {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom,0) + 1.2rem);
      left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(253,246,227,0.5);
    }

    /* ─────────  COMMUNITY  ───────── */
    #ui-community { background: var(--bg); }
    .popup {
      background: var(--paper);
      border-radius: 22px;
      padding: 1.8rem 1.6rem 1.5rem;
      width: min(86vw, 320px);
      text-align: center;
    }
    .popup-num   { font-family: var(--fd); font-size: clamp(2.4rem,10vw,3.2rem); color: var(--orange); margin: 0; }
    .popup-line  { font-size: 0.86rem; color: var(--muted); margin: 0.3rem 0 0.9rem; }
    .popup-title { font-family: var(--fd); font-size: clamp(1.5rem,6vw,2rem); letter-spacing: 0.08em; color: var(--ink); margin: 0 0 1.1rem; }
    .popup-cta {
      display: block; width: 100%;
      padding: 0.85rem;
      font-family: var(--fd); font-size: 1rem;
      letter-spacing: 0.2em;
      color: #fdf6e3; background: var(--orange);
      border-radius: 999px; margin-bottom: 0.7rem;
    }
    .popup-dismiss {
      width: 100%;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0.6rem;
    }

    /* ─────────  RESTART BUTTON  ───────── */
    .restart-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom,0) + 1rem);
      left: 1rem;
      z-index: 100;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      color: rgba(253,246,227,0.6);
      font-size: 1rem;
      display: none; place-items: center;
      border: 1px solid rgba(253,246,227,0.18);
    }
    body:not([data-state="intro"]) .restart-btn { display: grid; }
  </style>
</head>

<body data-state="intro">

  <!--
    ════════════════════════════════════════════════════════════════
    AR SCENE — created once, runs for the entire session.
    Never restarted. UI overlays sit on top.
    ════════════════════════════════════════════════════════════════
  -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 5"
    renderer="colorManagement: true; antialias: false; alpha: true; precision: mediump"
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets timeout="8000">
      <video
        id="valley-vid"
        src="./assets/valley-video.mp4"
        muted
        playsinline
        webkit-playsinline
        loop
        preload="auto"
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      <!--
        Video-textured plane anchored to the marker.
        Hidden by default — only shown after user taps "Tap to continue".
        ar-video-surface wires a THREE.VideoTexture and forces needsUpdate per tick.
      -->
      <a-plane
        id="ar-video-plane"
        position="0 0 0.01"
        width="1"
        height="0.56"
        visible="false"
        ar-video-surface="src: #valley-vid"
      ></a-plane>
    </a-entity>
  </a-scene>


  <!-- ══════════════════════════════════════════════════════════════
       UI OVERLAYS
       ══════════════════════════════════════════════════════════════ -->

  <!-- 1 · INTRO -->
  <div id="ui-intro" class="ui show">
    <h1 class="intro-title">WELCOME</h1>
    <p class="intro-sub">Are you ready?</p>
    <button class="btn-primary" id="btn-start">Scan to enter</button>
    <p class="intro-hint">No app needed · Camera will open</p>
  </div>

  <!-- 2 · SCAN — transparent, AR camera visible behind -->
  <div id="ui-scan" class="ui transparent">
    <div class="scan-frame">
      <i></i><i></i>
      <p class="scan-label">Find the can<em>Frame it within</em></p>
    </div>
  </div>

  <!-- 3 · DETECTED -->
  <div id="ui-detected" class="ui">
    <div class="det-card">
      <p class="det-eyebrow">Alba · Detected</p>
      <h2 class="det-title">Welcome</h2>
      <p class="det-sub">A small ceremony before the first sip.</p>
      <button class="det-cta" id="btn-detected">Tap to continue</button>
    </div>
  </div>

  <!-- 4 · VALLEY — transparent overlay over the AR video plane -->
  <div id="ui-valley" class="ui transparent">
    <p class="valley-hint">Tap to continue</p>
  </div>

  <!-- 5 · CARDS -->
  <div id="ui-cards" class="ui">
    <div class="cards-progress" id="cards-progress"></div>
    <div class="cards-stage" id="cards-stage"></div>
    <div class="cards-tap">Tap to continue</div>
  </div>

  <!-- 6 · COMMUNITY -->
  <div id="ui-community" class="ui">
    <div class="popup">
      <div class="popup-num">7,243</div>
      <p class="popup-line">People already gathered around this mesa</p>
      <h3 class="popup-title">Leave your trace?</h3>
      <button class="popup-cta" id="btn-join">Join the community</button>
      <button class="popup-dismiss" id="btn-skip">Maybe later</button>
    </div>
  </div>

  <button class="restart-btn" id="btn-restart" title="Restart">↺</button>


  <script>
    'use strict';

    /* ═══════════════════════════════════════════════════════════════
       VIDEO MANAGER  —  iOS-safe playback
       ═══════════════════════════════════════════════════════════════ */
    var Video = (function () {
      var vid;
      var unlocked   = false;
      var inFlight   = false;

      function init(el) {
        vid = el;
        vid.muted       = true;
        vid.playsInline = true;
        vid.setAttribute('playsinline', '');
        vid.setAttribute('webkit-playsinline', '');
      }

      /* Phase 1: prime iOS autoplay permissions inside a user gesture */
      function unlock() {
        if (unlocked || !vid) { return Promise.resolve(); }
        var p = vid.play();
        if (!p || typeof p.then !== 'function') {
          unlocked = true;
          console.log('VIDEO: unlocked (legacy)');
          return Promise.resolve();
        }
        return p.then(function () {
          vid.pause();
          vid.currentTime = 0;
          unlocked = true;
          console.log('VIDEO: unlocked');
        }).catch(function (err) {
          console.warn('VIDEO: unlock failed', err);
        });
      }

      /* Phase 2: actual playback. Single-flight + one retry after 300ms. */
      function play() {
        if (!vid || inFlight) { return; }
        inFlight = true;

        try { vid.currentTime = 0; } catch (e) {}
        var p = vid.play();

        if (!p || typeof p.then !== 'function') {
          inFlight = false;
          console.log('VIDEO: play success (legacy)');
          return;
        }
        p.then(function () {
          inFlight = false;
          console.log('VIDEO: play success');
        }).catch(function (err) {
          inFlight = false;
          console.warn('VIDEO: play failed', err);
          console.log('VIDEO: retry triggered');
          setTimeout(function () {
            var p2 = vid.play();
            if (p2 && typeof p2.then === 'function') {
              p2.then(function () { console.log('VIDEO: play success (retry)'); })
                .catch(function (e2) { console.warn('VIDEO: play failed (retry)', e2); });
            }
          }, 300);
        });
      }

      function pause() {
        if (!vid) { return; }
        try { vid.pause(); } catch (e) {}
      }

      return { init: init, unlock: unlock, play: play, pause: pause };
    })();

    /* ═══════════════════════════════════════════════════════════════
       UI STATE  —  pure overlay switching, never touches AR
       ═══════════════════════════════════════════════════════════════ */
    var UI = (function () {
      var current = 'intro';

      function show(id) {
        var screens = document.querySelectorAll('.ui');
        for (var i = 0; i < screens.length; i++) { screens[i].classList.remove('show'); }
        var el = document.getElementById('ui-' + id);
        if (el) { el.classList.add('show'); }
        current = id;
        document.body.dataset.state = id;
      }

      function state() { return current; }
      return { show: show, state: state };
    })();

    /* ═══════════════════════════════════════════════════════════════
       CARDS  —  HTML-only data → DOM
       ═══════════════════════════════════════════════════════════════ */
    var CARDS = [
      { num:'01', label:'The beer',       title:'ALBA',    desc:'Soft wheat, bright citrus, mid-morning sun.',    color:'orange', img:'./assets/can.png' },
      { num:'02', label:'The ingredient', title:'NARANJA', desc:'Valencia oranges, picked at the end of winter.', color:'olive',  img:'./assets/wheat-orange.png' },
      { num:'03', label:'The valley',     title:'ZARRA',   desc:'A village of 400, a brewery, and a river.',      color:'amber',  img:'./assets/sun-mountains.png' },
      { num:'04', label:'The brewer',     title:'AITOR',   desc:'Third generation. Vive grande, vive libre.',     color:'sage',   img:'./assets/brewery.png' },
    ];
    var cardIdx = 0;

    (function buildCards() {
      var stage    = document.getElementById('cards-stage');
      var progress = document.getElementById('cards-progress');
      CARDS.forEach(function (c) {
        var el = document.createElement('div');
        el.className = 'card';
        el.dataset.color = c.color;
        el.innerHTML =
          '<div class="card-art"><img src="' + c.img + '" alt="' + c.title + '"></div>' +
          '<p class="card-meta">/ ' + c.num + ' · ' + c.label + '</p>' +
          '<h2 class="card-title">' + c.title + '</h2>' +
          '<p class="card-desc">' + c.desc + '</p>';
        stage.appendChild(el);
        var dot = document.createElement('span');
        dot.className = 'dot';
        progress.appendChild(dot);
      });
    })();

    function showCard(i) {
      cardIdx = i;
      document.querySelectorAll('.card').forEach(function (el, idx) {
        el.classList.toggle('is-current', idx === i);
        el.classList.toggle('is-past',    idx <  i);
      });
      document.querySelectorAll('.cards-progress .dot').forEach(function (d, idx) {
        d.classList.toggle('on', idx === i);
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       AR LIFECYCLE  —  started once, never stopped
       ═══════════════════════════════════════════════════════════════ */
    var scene       = document.getElementById('ar-scene');
    var target      = document.getElementById('ar-target');
    var videoPlane  = document.getElementById('ar-video-plane');
    var arStarted   = false;

    function startAR() {
      if (arStarted) { return; }
      arStarted = true;

      var go = function () {
        var sys = scene.systems['mindar-image-system'];
        if (!sys) {
          console.error('AR: mindar-image-system not found');
          return;
        }
        sys.start()
          .then(function () { console.log('AR: system started'); })
          .catch(function (err) {
            console.error('AR: start failed', err);
            arStarted = false;
            alert('Camera access required. Please allow camera access and reload.');
          });
      };

      if (scene.hasLoaded) { go(); }
      else { scene.addEventListener('loaded', go, { once: true }); }
    }

    /* targetFound / targetLost ONLY update UI and video state.
       They never restart MindAR or unmount the scene. */
    target.addEventListener('targetFound', function () {
      console.log('AR: target found');
      var s = UI.state();
      if (s === 'scan') {
        UI.show('detected');
      } else if (s === 'valley') {
        Video.play();
      }
    });

    target.addEventListener('targetLost', function () {
      console.log('AR: target lost');
      var s = UI.state();
      if (s === 'detected') {
        UI.show('scan');
      } else if (s === 'valley') {
        Video.pause();
      }
    });


    /* ═══════════════════════════════════════════════════════════════
       BUTTON WIRING
       ═══════════════════════════════════════════════════════════════ */
    Video.init(document.getElementById('valley-vid'));

    document.getElementById('btn-start').addEventListener('click', function () {
      // First gesture: unlock video AND start AR
      Video.unlock().then(function () {
        UI.show('scan');
        startAR();
      });
    });

    document.getElementById('btn-detected').addEventListener('click', function () {
      videoPlane.setAttribute('visible', true);
      UI.show('valley');
      Video.play();
    });

    document.getElementById('ui-valley').addEventListener('click', function () {
      Video.pause();
      videoPlane.setAttribute('visible', false);
      UI.show('cards');
      showCard(0);
    });

    document.getElementById('ui-cards').addEventListener('click', function (e) {
      if (e.target.closest('#btn-restart')) { return; }
      if (cardIdx < CARDS.length - 1) { showCard(cardIdx + 1); }
      else { UI.show('community'); }
    });

    document.getElementById('btn-join').addEventListener('click', function () {
      window.open('https://www.cerveceriadezarra.es', '_blank', 'noopener');
    });

    document.getElementById('btn-skip').addEventListener('click', restart);
    document.getElementById('btn-restart').addEventListener('click', restart);

    function restart() {
      Video.pause();
      videoPlane.setAttribute('visible', false);
      cardIdx = 0;
      showCard(0);
      UI.show('scan');
    }


    /* ═══════════════════════════════════════════════════════════════
       HTTPS GUARD
       ═══════════════════════════════════════════════════════════════ */
    if (
      location.protocol !== 'https:' &&
      location.hostname  !== 'localhost' &&
      location.hostname  !== '127.0.0.1'
    ) {
      var warn = document.createElement('div');
      warn.style.cssText =
        'position:fixed;top:0;left:0;right:0;padding:.6rem 1rem;background:#7a2418;color:#fff;font:600 .75rem system-ui;z-index:9999;text-align:center;letter-spacing:.06em';
      warn.textContent = 'WebAR needs HTTPS — open this page over https:// or localhost.';
      document.body.appendChild(warn);
    }
  </script>
</body>
</html>
